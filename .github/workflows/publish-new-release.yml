name: Publish New Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: true
env:
  version: ${{ inputs.version }}
jobs:
  build_chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
      - uses: borales/actions-yarn@3766bb1335b98fb13c60eaf358fe20811b730a88 #v5
        with:
          cmd: install

      - name: Bump package version to ${{ env.version }}
        run: |
          jq --arg version "$version" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json


      - name: Build Chrome Extension ${{ env.version }}
        run: yarn plasmo build --target=chrome-mv3 --zip

      - name: Create key.pem ${{ env.version }}
        env:
          CRX_KEY: ${{ secrets.CRX_KEY }}
        run: echo "$CRX_KEY" > key.pem

      - name: Package Chrome Extension ${{ env.version }}
        run: >
          yarn crx3
          --keyPath key.pem
          --zipPath "./release/7speaking-bot-rework_chrome-$version.zip"
          --crxPath "./release/7speaking-bot-rework_chromium-$version.crx"
          --xmlPath "./release/chrome_update.xml"
          --crxURL "https://github.com/orkeilius/7speaking-bot-rework/releases/download/$version/7speaking-bot-rework_chromium-$version.crx"
          "./build/chrome-mv3-prod/manifest.json"
      - name: Upload Chrome Extension ${{ env.version }} zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: "./release/7speaking-bot-rework_chrome-${{ env.version }}.zip"
          name: 7speaking-bot-rework_chrome-${{ env.version }}.zip
      - name: Upload Chromium Extension crx
        uses: actions/upload-artifact@v7.0.1
        with:
          path: "./release/7speaking-bot-rework_chromium-${{ env.version }}.crx"
          name: 7speaking-bot-rework_chromium-${{ env.version }}.crx
      - name: Upload Chrome metadata
        uses: actions/upload-artifact@v7.0.1
        with:
          path: "./release/chrome_update.xml"
          name: chrome_update_${{ env.version }}

  build_firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v4
        with:
           cache: "yarn"
      - uses: borales/actions-yarn@3766bb1335b98fb13c60eaf358fe20811b730a88 #v5
        with:
          cmd: install

      - name: Bump package version to ${{ env.version }}
        run: |
          jq --arg version "$version" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build Firefox Extension
        run: yarn plasmo build --target=firefox-mv3 --zip

      - name: Upload Firefox unsigned Extension zip
        uses: actions/upload-artifact@v7.0.1
        with:
          path: "./build/firefox-mv3-prod.zip"
          name: 7speaking-bot-rework_firefox-${{ env.version }}-unsigned

  sign_firefox:
    runs-on: ubuntu-latest
    needs: build_firefox
    env:
      FIREFOX_ID: 7speaking-bot-rework@github.com
      FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
      FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
      FIREFOX_TAG: ${{ inputs.version }}
      INPUT_PATH: ./build/firefox-mv3-prod.zip
      OUTPUT_PATH: ./7speaking-bot-rework_firefox-${{ inputs.version }}.xpi
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v4
        with:
           cache: "yarn"
      - uses: borales/actions-yarn@3766bb1335b98fb13c60eaf358fe20811b730a88 #v5
        with:
          cmd: install

      - name: Download Firefox unsigned Extension
        uses: actions/download-artifact@v8.0.1
        with:
          name: 7speaking-bot-rework_firefox-${{ env.version }}-unsigned
          path: "./build/"

      - name: Upload signed firefox extension
        continue-on-error: true
        run: node ./script/upload-firefox.js

      - name: Wait for signing
        run: node ./script/wait-for-signing.js

      - name: Download signed Firefox Extension
        run: node ./script/download-signed-firefox.js

      - name: Upload signed Firefox Extension
        uses: actions/upload-artifact@v7.0.1
        with:
          path: ./7speaking-bot-rework_firefox-${{ env.version }}.xpi
          name: 7speaking-bot-rework_firefox-${{ env.version }}.xpi

  update-repo:
    runs-on: ubuntu-latest
    needs:
      - build_chrome
      - sign_firefox
    permissions:
      contents: write
      id-token: write
      deployments: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - uses: actions/setup-node@v4
        with:
           cache: "yarn"
      - uses: borales/actions-yarn@3766bb1335b98fb13c60eaf358fe20811b730a88 #v5
        with:
          cmd: install

      - name: Download chrome metadata
        uses: actions/download-artifact@v8.0.1
        with:
          name: chrome_update_${{ env.version }}
          path: "./release/"

      - name: update package to version ${{ inputs.version }}
        run: |
          jq --arg version "$version" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update firefox_update.json ${{ inputs.version }}
        run: |
          FIREFOX_ID="7speaking-bot-rework@github.com"
          UPDATE_LINK="https://github.com/orkeilius/7speaking-bot-rework/releases/download/$version/7speaking-bot-rework_firefox-$version.xpi"
          jq --arg version "$version" \
             --arg firefox_id "$FIREFOX_ID" \
             --arg update_link "$UPDATE_LINK" \
             '.addons[$firefox_id].updates += [{"version": $version, "update_link": $update_link}]' \
             release/firefox_update.json > release/firefox_update.json.tmp
          mv release/firefox_update.json.tmp release/firefox_update.json

      - name: Commit update
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 #v10
        with:
          message: "chore: release version ${{ env.version }} "
          tag: ${{ env.version }}

  release:
    runs-on: ubuntu-latest
    needs: update-repo
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Download Chrome zip
        uses: actions/download-artifact@v8.0.1
        with:
          name: 7speaking-bot-rework_chrome-${{ env.version }}.zip
          path: "./release/"

      - name: Download Chromium crx
        uses: actions/download-artifact@v8.0.1
        with:
          name: 7speaking-bot-rework_chromium-${{ env.version }}.crx
          path: "./release/"

      - name: Download Firefox signed xpi
        uses: actions/download-artifact@v8.0.1
        with:
          name: 7speaking-bot-rework_firefox-${{ env.version }}.xpi
          path: "./release/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b #v3.0.1
        with:
          tag_name: ${{ env.version }}
          name: ${{ env.version }}
          generate_release_notes: true
          files: |
            ./release/7speaking-bot-rework_chrome-${{ env.version }}.zip
            ./release/7speaking-bot-rework_chromium-${{ env.version }}.crx
            ./release/7speaking-bot-rework_firefox-${{ env.version }}.xpi

