name: Weekly 7speaking Check

on:
  schedule:
    - cron: '0 8 * * 1' # Chaque lundi à 8h UTC
  workflow_dispatch:

jobs:
  test:
    name: Check 7speaking access
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      website_test_username: ${{ secrets.WEBSITE_TEST_USERNAME }}
      website_test_password: ${{ secrets.WEBSITE_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v4
      - uses: borales/actions-yarn@3766bb1335b98fb13c60eaf358fe20811b730a88 #v5
        with:
          cmd: install

      - name: Install Playwright Browser
        run: yarn playwright install chromium

      - name: Run tests
        run: npm run test
